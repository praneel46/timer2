<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Timer</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="start-screen">

  <!-- 🔥 TITLE -->
  <div class="title-container">
    <h1 class="title fire-title">TECHNO QUEST</h1>
  </div>

  <!-- START BUTTON -->
  <button class="start-btn" onclick="startApp()">START</button>

</div>

<!-- TIMER SCREEN -->
<div id="timerScreen" class="timer-screen hidden">
  
  <!-- 🔥 PARTICLES -->
  <canvas id="particles"></canvas>

  <!-- 📊 PROGRESS BAR -->
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <!-- 💥 INTRO TEXT (3 2 1 GO) -->
  <div id="introText" class="intro-fire"></div>

  <!-- ⏱ TIMER -->
  <div id="timer">00:00</div>

</div>

<!-- 🔊 BUZZER -->
<audio id="buzzer" src="buzzer.mp3" preload="auto"></audio>

<script src="script.js"></script>
</body>
</html>
